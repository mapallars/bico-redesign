<!DOCTYPE html>

<html class="light" lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-tint": "#7d5700",
            "surface-container": "#faebe2",
            "on-background": "#211a15",
            "surface-container-highest": "#eee0d7",
            "on-tertiary-container": "#275b00",
            "error": "#ba1a1a",
            "surface-container-low": "#fff1e9",
            "on-primary": "#ffffff",
            "outline-variant": "#d6c4ac",
            "on-tertiary-fixed": "#092100",
            "on-error": "#ffffff",
            "surface-dim": "#e6d7cf",
            "secondary-container": "#fcddc8",
            "surface-container-lowest": "#ffffff",
            "surface": "#fff8f5",
            "on-primary-container": "#6b4a00",
            "outline": "#837560",
            "on-secondary-container": "#776050",
            "surface-bright": "#fff8f5",
            "background": "#fff8f5",
            "tertiary-fixed": "#8efd49",
            "tertiary": "#2f6c00",
            "on-surface-variant": "#514532",
            "on-secondary-fixed-variant": "#574334",
            "on-error-container": "#93000a",
            "secondary": "#705a4a",
            "surface-variant": "#eee0d7",
            "primary-fixed-dim": "#ffba30",
            "on-primary-fixed-variant": "#5f4100",
            "secondary-fixed-dim": "#dec1ad",
            "primary-fixed": "#ffdeab",
            "tertiary-container": "#70db26",
            "inverse-primary": "#ffba30",
            "on-tertiary-fixed-variant": "#225100",
            "primary-container": "#ffb500",
            "on-secondary": "#ffffff",
            "on-primary-fixed": "#271900",
            "inverse-on-surface": "#fdeee5",
            "surface-container-high": "#f4e5dd",
            "secondary-fixed": "#fcddc8",
            "on-tertiary": "#ffffff",
            "primary": "#7d5700",
            "error-container": "#ffdad6",
            "tertiary-fixed-dim": "#73df2b",
            "inverse-surface": "#372f29",
            "on-surface": "#211a15",
            "on-secondary-fixed": "#28180c"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "unit": "8px",
            "container-margin-desktop": "40px",
            "container-margin-mobile": "16px",
            "stack-sm": "8px",
            "stack-md": "16px",
            "gutter": "16px",
            "stack-lg": "32px"
          },
          "fontFamily": {
            "label-md": ["Inter"],
            "display-lg-mobile": ["Inter"],
            "body-lg": ["Inter"],
            "title-lg": ["Inter"],
            "body-md": ["Inter"],
            "label-sm": ["Inter"],
            "headline-md": ["Inter"],
            "display-lg": ["Inter"]
          },
          "fontSize": {
            "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
            "display-lg-mobile": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
            "title-lg": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
            "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
            "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
            "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
            "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
          }
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #fff8f5;
      -webkit-tap-highlight-color: transparent;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .Perfil-card-shadow {
      box-shadow: 0px 4px 20px rgba(92, 71, 56, 0.06);
    }

    .active-nav-scale {
      transform: scale(0.9);
      transition: transform 0.2s ease;
    }

    ::-webkit-scrollbar {
      display: none;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-surface text-on-surface antialiased pb-24">
  <!-- TopAppBar -->
  <header class="bg-surface dark:bg-surface-dim sticky top-0 z-50 flex justify-between items-center w-full px-4 h-16">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high border-2 border-primary">
        <img alt="Perfil" class="w-full h-full object-cover"
          data-alt="A professional close-up portrait of a friendly Hispanic man in his late 30s with a warm smile, set against a soft, sun-drenched rural Colombian landscape. The lighting is natural and high-key, emphasizing a light-mode aesthetic. The color palette features earthy tones, soft browns, and golden hues that reflect a secure and grounded financial institution."
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgRhkFxuEGX1Dc0qL-Kb4F-jHPLeY-2o1oLd3EQRbiXmzCQRqrQrbkTEgNjmlakXZBHSkkx08WLq-xXeNZ0TTdkVjhTZ3BOjc-IXZ1zyxY_s4QC-Wk0X4aZg-mhF-OObRMjCLIWJjUss9Aa72kL4R0zslaA7Rrn1igRp5TatEoyFWAgpafGDjjIsiWSu8WYwEsPhbdjfPZ8QDYzPKML0mYpBF35whvhxy4TWoCB_O3vAilpx8Y8AXR83xnzbTgkxFhGm1ZYEh91MzS" />
      </div>
      <img class="h-[25px]" src="../public/logotype.png" alt="BICO" />
    </div>
    <button
      class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
      <span class="material-symbols-outlined text-primary" data-icon="notifications">notifications</span>
    </button>
  </header>
  <main class="px-4 py-6 max-w-lg mx-auto space-y-8">
    <!-- Hero Perfil Section -->
    <section class="flex flex-col items-center text-center space-y-2">
      <div class="space-y-1">
        <h1 class="text-headline-md font-headline-md text-on-surface">¡Hola, David!</h1>
        <p class="text-body-lg font-body-lg text-on-surface-variant font-semibold">David Ortiz</p>
      </div>
      <div class="flex flex-col gap-1 mt-2 text-label-md font-label-md text-secondary">
        <div class="flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-[18px]" data-icon="badge">badge</span>
          <span>C.C. 1.023.445.XXX</span>
        </div>
        <div class="flex items-center justify-center gap-2 opacity-70">
          <span class="material-symbols-outlined text-[18px]" data-icon="schedule">schedule</span>
          <span>Último ingreso: Hoy, 08:45 AM</span>
        </div>
      </div>
    </section>
    <!-- Perfil Menu Options -->
    <section class="space-y-3">
      <!-- Option Item -->
      <button
        class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl Perfil-card-shadow hover:bg-surface-container-low transition-all active:scale-[0.98]">
        <div class="flex items-center gap-4">
          <div
            class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
            <span class="material-symbols-outlined" data-icon="lock_reset">lock_reset</span>
          </div>
          <span class="text-body-md font-body-md text-on-surface">Cambiar contraseña</span>
        </div>
        <span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
      </button>
      <button
        class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl Perfil-card-shadow hover:bg-surface-container-low transition-all active:scale-[0.98]">
        <div class="flex items-center gap-4">
          <div
            class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
            <span class="material-symbols-outlined" data-icon="alternate_email">alternate_email</span>
          </div>
          <span class="text-body-md font-body-md text-on-surface">Actualizar correo</span>
        </div>
        <span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
      </button>
      <button
        class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl Perfil-card-shadow hover:bg-surface-container-low transition-all active:scale-[0.98]">
        <div class="flex items-center gap-4">
          <div
            class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
            <span class="material-symbols-outlined" data-icon="history">history</span>
          </div>
          <span class="text-body-md font-body-md text-on-surface">Mi actividad reciente</span>
        </div>
        <span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
      </button>
      <button
        class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl Perfil-card-shadow hover:bg-surface-container-low transition-all active:scale-[0.98]">
        <div class="flex items-center gap-4">
          <div
            class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
            <span class="material-symbols-outlined" data-icon="description">description</span>
          </div>
          <span class="text-body-md font-body-md text-on-surface">Mis extractos</span>
        </div>
        <span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
      </button>
      <div class="pt-4 border-t border-outline-variant opacity-30"></div>
      <button
        class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl Perfil-card-shadow hover:bg-surface-container-low transition-all active:scale-[0.98]">
        <div class="flex items-center gap-4">
          <div
            class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant">
            <span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
          </div>
          <span class="text-body-md font-body-md text-on-surface">Ayuda</span>
        </div>
        <span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
      </button>
      <button
        class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl Perfil-card-shadow hover:bg-surface-container-low transition-all active:scale-[0.98]">
        <div class="flex items-center gap-4">
          <div
            class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant">
            <span class="material-symbols-outlined" data-icon="policy">policy</span>
          </div>
          <span class="text-body-md font-body-md text-on-surface">Política de privacidad</span>
        </div>
        <span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
      </button>
    </section>
    <!-- Logout Button -->
    <section class="flex justify-center pt-8">
      <button
        class="flex items-center gap-2 px-6 py-3 text-error font-label-md text-label-md hover:bg-error-container/10 rounded-full transition-colors active:scale-95">
        <span class="material-symbols-outlined" data-icon="logout">logout</span>
        Cerrar Sesión
      </button>
    </section>
    <!-- Subtle Branding -->
    <div class="text-center opacity-40 py-4">
      <p class="text-label-sm font-label-sm uppercase tracking-widest text-secondary">BICO • Banco Agrariol Core</p>
      <p class="text-label-sm font-label-sm mt-1">Versión 2.4.0</p>
    </div>
  </main>
  <!-- BottomNavBar -->
  <nav
    class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 pb-safe bg-surface dark:bg-surface-dim shadow-[0px_-4px_20px_rgba(92,71,56,0.06)] rounded-t-xl">
    <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-3 py-1 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors"
      href="#">
      <span class="material-symbols-outlined" data-icon="home">home</span>
      <span class="text-label-sm font-label-sm">Home</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-3 py-1 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors"
      href="#">
      <span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
      <span class="text-label-sm font-label-sm">Bolsillos</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-3 py-1 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors"
      href="#">
      <span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
      <span class="text-label-sm font-label-sm">QR</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-3 py-1 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors"
      href="#">
      <span class="material-symbols-outlined" data-icon="history">history</span>
      <span class="text-label-sm font-label-sm">Movimientos</span>
    </a>
    <a class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-2xl px-3 py-1 active-nav-scale"
      href="#">
      <span class="material-symbols-outlined" data-icon="person"
        style="font-variation-settings: 'FILL' 1;">person</span>
      <span class="text-label-sm font-label-sm">Perfil</span>
    </a>
  </nav>
  <script>
    // Simple micro-interaction for touch feedback on navigation
    document.querySelectorAll('nav a').forEach(link => {
      link.addEventListener('click', function (e) {
        // Remove active classes from others (Simulating navigation)
        document.querySelectorAll('nav a').forEach(l => {
          l.classList.remove('bg-primary-container', 'dark:bg-primary', 'text-on-primary-container', 'dark:text-on-primary', 'rounded-2xl', 'active-nav-scale');
          l.classList.add('text-on-surface-variant', 'dark:text-outline-variant');
          const icon = l.querySelector('.material-symbols-outlined');
          if (icon) icon.style.fontVariationSettings = "'FILL' 0";
        });

        // Add active state to clicked
        this.classList.remove('text-on-surface-variant', 'dark:text-outline-variant');
        this.classList.add('bg-primary-container', 'dark:bg-primary', 'text-on-primary-container', 'dark:text-on-primary', 'rounded-2xl', 'active-nav-scale');
        const icon = this.querySelector('.material-symbols-outlined');
        if (icon) icon.style.fontVariationSettings = "'FILL' 1";
      });
    });
  </script>
</body>

</html>
