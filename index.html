<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, #2b2b2b, #0f0f0f 60%);
            font-family: sans-serif;
        }

        .phone-frame {
            position: relative;
            aspect-ratio: 9 / 18;
            height: min(90vh, 920px);
            max-width: calc(96vh * (9 / 18));
            width: auto;
            background: #000;
            border-radius: 42px;
            padding: 12px;
            box-shadow:
                0 0 0 2px #1a1a1a,
                0 0 0 6px #2f2f2f,
                0 30px 60px rgba(0, 0, 0, 0.65),
                inset 0 0 2px rgba(255, 255, 255, 0.15);
            overflow: hidden;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 32px;
            overflow: hidden;
            background:
                linear-gradient(180deg,
                    #181818,
                    #101010);
            position: relative;
        }

        .phone-frame .btn {
            position: absolute;
            left: -4px;
            width: 4px;
            border-radius: 4px;
            background: linear-gradient(180deg,
                    #4a4a4a,
                    #1d1d1d);
        }

        .phone-frame .btn.vol-up {
            top: 140px;
            height: 60px;
        }

        .phone-frame .btn.vol-down {
            top: 215px;
            height: 60px;
        }

        .phone-frame .btn.power {
            right: -4px;
            left: auto;
            top: 180px;
            height: 90px;
        }

        .home-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 35%;
            height: 5px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.85);
        }

        .phone-content {
            height: 100%;
            color: white;
            display: grid;
            place-items: center;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="phone-frame">

        <div class="btn vol-up"></div>
        <div class="btn vol-down"></div>
        <div class="btn power"></div>

        <div class="phone-screen">

            <div class="phone-content">
                <iframe src="/onboarding" frameborder="0" width="100%" height="100%"></iframe>
            </div>

            <div class="home-indicator"></div>

        </div>
    </div>
</body>

</html>
